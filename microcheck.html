<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 아나운서 마이크 제어 테스트</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 400px; text-align: center; }
        h2 { color: #333; margin-bottom: 20px; }
        .form-group { margin-bottom: 20px; text-align: left; }
        select { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #ccc; font-size: 14px; }
        button { background-color: #007bff; color: white; border: none; padding: 12px 20px; border-radius: 6px; font-size: 16px; cursor: pointer; width: 100%; transition: background 0.3s; }
        button.recording { background-color: #dc3545; animation: pulse 1.5s infinite; }
        audio { width: 100%; margin-top: 20px; display: none; }
        .log { margin-top: 15px; font-size: 12px; color: #666; background: #f8f9fa; padding: 10px; border-radius: 6px; text-align: left; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div class="container">
    <h2>🎙️ 스피치 평가 환경 세팅</h2>
    
    <div class="form-group">
        <label for="micSelect"><strong>1. 마이크 선택</strong></label>
        <select id="micSelect">
            <option value="">권한을 확인하는 중...</option>
        </select>
    </div>

    <button id="recordBtn">녹음 시작</button>
    
    <audio id="audioPlayback" controls></audio>
    
    <div class="log" id="statusLog">대기 중...</div>
</div>

<script>
    const micSelect = document.getElementById('micSelect');
    const recordBtn = document.getElementById('recordBtn');
    const audioPlayback = document.getElementById('audioPlayback');
    const statusLog = document.getElementById('statusLog');

    let mediaRecorder;
    let audioChunks = [];

    function updateLog(message) {
        statusLog.innerHTML = `> ${message}`;
        console.log(message);
    }

    // 1. 연결된 마이크 목록 불러오기
    async function getMicrophones() {
        try {
            updateLog("마이크 권한을 요청합니다...");
            // 권한을 얻어야 장치 이름(label)을 볼 수 있음
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            
            const devices = await navigator.mediaDevices.enumerateDevices();
            const audioInputs = devices.filter(device => device.kind === 'audioinput');
            
            micSelect.innerHTML = ''; // 초기화
            
            audioInputs.forEach((device, index) => {
                const option = document.createElement('option');
                option.value = device.deviceId;
                // 이름이 없으면 기본 이름 할당
                option.text = device.label || `마이크 ${index + 1}`;
                micSelect.appendChild(option);
            });

            // 초기 권한 확인용으로 켰던 마이크 스트림 끄기 (리소스 절약)
            stream.getTracks().forEach(track => track.stop());
            updateLog("마이크 목록을 성공적으로 불러왔습니다.");

        } catch (error) {
            updateLog("오류: 마이크 권한이 거부되었거나 장치가 없습니다.");
            alert("주소창 옆 자물쇠 아이콘을 눌러 마이크 권한을 허용해 주세요!");
        }
    }

    // 2. 녹음 시작
    async function startRecording() {
        const selectedDeviceId = micSelect.value;
        if (!selectedDeviceId) return alert("마이크를 선택해 주세요.");

        try {
            // 선택한 마이크로 스트림 요청 + 노이즈 캔슬링 옵션 적용
            const stream = await navigator.mediaDevices.getUserMedia({
                audio: { 
                    deviceId: { exact: selectedDeviceId },
                    noiseSuppression: true,
                    echoCancellation: true
                }
            });

            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];

            mediaRecorder.ondataavailable = event => {
                if (event.data.size > 0) audioChunks.push(event.data);
            };

            mediaRecorder.onstop = () => {
                const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                const audioUrl = URL.createObjectURL(audioBlob);
                
                // 화면의 오디오 플레이어에 녹음된 파일 연결
                audioPlayback.src = audioUrl;
                audioPlayback.style.display = "block";
                updateLog("녹음 완료! 플레이어에서 목소리를 확인해 보세요.");
            };

            mediaRecorder.start();
            recordBtn.textContent = "녹음 중지";
            recordBtn.classList.add("recording");
            updateLog("녹음 중... 아나운서처럼 대본을 읽어보세요!");
            
            recordBtn.onclick = stopRecording;

        } catch (error) {
            updateLog("오류: 선택한 마이크를 켤 수 없습니다.");
        }
    }

    // 3. 녹음 중지
    function stopRecording() {
        if (mediaRecorder && mediaRecorder.state === "recording") {
            mediaRecorder.stop();
            
            // 사용 중인 마이크 스트림 완전히 끄기
            mediaRecorder.stream.getTracks().forEach(track => track.stop());
            
            recordBtn.textContent = "녹음 시작";
            recordBtn.classList.remove("recording");
            recordBtn.onclick = startRecording;
        }
    }

    // 페이지 로드 시 마이크 목록 불러오기 실행
    window.addEventListener('load', getMicrophones);
    recordBtn.onclick = startRecording;

</script>
</body>
</html>
