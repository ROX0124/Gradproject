<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 보이스 코칭 프로토타입</title>

    <style>
        :root {
            --primary: #4A90E2;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-dark: #333333;
            --text-light: #666666;
        }

        body {
            font-family: 'Pretendard', -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 500px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            padding: 30px;
            box-sizing: border-box;
            text-align: center;
        }

        .screen { display: none; }
        .screen.active { display: block; }

        h1 { font-size: 24px; margin-bottom: 20px; }
        h2 { font-size: 20px; color: var(--primary); }

        .script-box {
            background-color: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 20px;
            border: 1px solid #e9ecef;
            text-align: left;
            word-break: keep-all;
            overflow-wrap: break-word;
            white-space: normal;
        }

        #script-display { text-align: center; }

        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 15px 20px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            margin-bottom: 10px;
            transition: 0.2s;
        }
        button:hover { background-color: #357ABD; }
        button:disabled { background-color: #cccccc; cursor: not-allowed; }

        .btn-stop { background-color: #E24A4A; }
        .btn-stop:hover { background-color: #BD3535; }

        .result-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
            align-items: start;
        }

        .result-card {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            position: relative;
            text-align: left;
        }
        .result-card span.label {
            display: block;
            font-size: 14px;
            color: var(--text-light);
        }
        .result-card strong {
            font-size: 18px;
            color: var(--primary);
        }

        .toggle-btn {
            position: absolute;
            right: 8px;
            bottom: 8px;
            width: 26px;
            height: 26px;
            border-radius: 50%;
            background-color: #fff;
            border: 1px solid #ddd;
            color: var(--primary);
            font-size: 12px;
            line-height: 1;
            padding: 0;
            margin: 0;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.3s ease, background-color 0.2s;
        }
        .toggle-btn:hover { background-color: #eef4fc; }
        .toggle-btn.open { transform: rotate(180deg); }

        .detail-panel {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease, margin-top 0.3s ease, padding 0.3s ease;
            background-color: #ffffff;
            border-radius: 8px;
            font-size: 13px;
            color: var(--text-dark);
            text-align: left;
            line-height: 1.5;
            margin-top: 0;
            padding: 0 12px;
        }
        .detail-panel.open {
            max-height: 400px;
            margin-top: 10px;
            padding: 12px;
            border: 1px solid #e9ecef;
            overflow: auto;
        }
        .detail-panel .feedback { margin-bottom: 8px; }
        .detail-panel .avg {
            color: var(--text-light);
            font-size: 12px;
            border-top: 1px dashed #e0e0e0;
            padding-top: 6px;
        }

        .text-card-content {
            font-size: 15px;
            line-height: 1.6;
            white-space: normal;
            overflow-wrap: anywhere;
            word-break: break-word;
        }

        #loading { display: none; color: var(--primary); font-weight: bold; margin-top: 10px; }

        .progress-wrap { display: none; margin-top: 15px; }
        .progress-bar { width: 100%; height: 14px; background-color: #e9ecef; border-radius: 7px; overflow: hidden; }
        .progress-fill { height: 100%; width: 0%; background-color: var(--primary); transition: width 0.3s ease; }
        .progress-text { margin-top: 8px; font-size: 14px; color: var(--primary); font-weight: bold; }

        .diff-wrong {
            color: #E24A4A;
            font-weight: bold;
            text-decoration: underline;
            text-decoration-color: #E24A4A;
        }
    </style>
</head>

<body>
    <div class="container">

        <div id="screen-home" class="screen active">
            <h1>🎙️ AI 스피치 훈련</h1>
            <p>랜덤 문장으로 당신의 발음을 교정해보세요.</p>
            <br>
            <button onclick="startRandom()">🎲 랜덤 단문 챌린지 시작</button>
            <button onclick="showHistory()" style="background-color: #34C759; margin-top: 10px;">📜 과거 기록 보기</button>
        </div>

        <div id="screen-record" class="screen">
            <h1>도전 대본</h1>
            <div id="script-display" class="script-box">대본 로딩 중</div>
            <h2 id="timer">00:00</h2>

            <button id="btn-start-record" onclick="startRecording()">🔴 녹음 시작</button>
            <button id="btn-stop-record" class="btn-stop" onclick="stopRecording()" style="display: none;">⏹️ 녹음 정지</button>
            <button id="btn-analyze" onclick="analyzeRecording()" style="display: none;">📊 녹음 파일 분석</button>
            <button id="btn-retry" onclick="retryRecording()" style="display: none; background-color: #FF9500;">🔄 다시 녹음하기</button>
            <button onclick="goHome()" style="background-color: #666; margin-top: 10px;">🏠 취소하고 홈으로</button>

            <div id="loading">AI가 목소리를 정밀 분석 중입니다 ⏳</div>
            <div id="progress-wrap" class="progress-wrap">
                <div class="progress-bar"><div id="progress-fill" class="progress-fill"></div></div>
                <div id="progress-text" class="progress-text">0%</div>
            </div>
        </div>

        <div id="screen-result" class="screen">
            <h1>분석 리포트 📊</h1>

            <div class="result-grid">
                <div class="result-card" style="grid-column: span 2;">
                    <span class="label">종합 명료도 점수</span>
                    <strong id="res-clarity" style="font-size: 28px;">0점</strong>
                    <button class="toggle-btn" onclick="toggleDetail('detail-clarity', this)">▼</button>
                    <div id="detail-clarity" class="detail-panel">
                        <div class="feedback" id="fb-clarity"></div>
                        <div class="avg" id="avg-clarity"></div>
                    </div>
                </div>

                <div class="result-card">
                    <span class="label">발음 정확도</span>
                    <strong id="res-accuracy">0%</strong>
                    <button class="toggle-btn" onclick="toggleDetail('detail-accuracy', this)">▼</button>
                    <div id="detail-accuracy" class="detail-panel">
                        <div class="feedback" id="fb-accuracy"></div>
                        <div class="avg" id="avg-accuracy"></div>
                    </div>
                </div>

                <div class="result-card">
                    <span class="label">말하기 속도</span>
                    <strong id="res-rate">0 음절/초</strong>
                    <button class="toggle-btn" onclick="toggleDetail('detail-rate', this)">▼</button>
                    <div id="detail-rate" class="detail-panel">
                        <div class="feedback" id="fb-rate"></div>
                        <div class="avg" id="avg-rate"></div>
                    </div>
                </div>

                <div class="result-card">
                    <span class="label">침묵 비율</span>
                    <strong id="res-silence">0%</strong>
                    <button class="toggle-btn" onclick="toggleDetail('detail-silence', this)">▼</button>
                    <div id="detail-silence" class="detail-panel">
                        <div class="feedback" id="fb-silence"></div>
                        <div class="avg" id="avg-silence"></div>
                    </div>
                </div>

                <div class="result-card">
                    <span class="label">총 소요 시간</span>
                    <strong id="res-duration">0초</strong>
                    <button class="toggle-btn" onclick="toggleDetail('detail-duration', this)">▼</button>
                    <div id="detail-duration" class="detail-panel">
                        <div class="feedback" id="fb-duration"></div>
                        <div class="avg" id="avg-duration"></div>
                    </div>
                </div>

                <div class="result-card" id="announcer-voice-container" style="grid-column: span 2; display: none;">
                    <span class="label">🎙️ 아나운서 정답 음성 듣기</span>
                    <button class="toggle-btn" onclick="toggleDetail('detail-announcer', this)">▼</button>
                    <div id="detail-announcer" class="detail-panel">
                        <audio id="announcer-player" controls style="width: 100%;"></audio>
                    </div>
                </div>

                <div class="result-card" style="grid-column: span 2;">
                    <span class="label">🎧 내 녹음 다시 듣기</span>
                    <button class="toggle-btn" onclick="toggleDetail('detail-audio', this)">▼</button>
                    <div id="detail-audio" class="detail-panel">
                        <audio id="result-audio" controls style="width: 100%;"></audio>
                    </div>
                </div>

                <div class="result-card" style="grid-column: span 2;">
                    <span class="label">📄 원본 대본</span>
                    <button class="toggle-btn" onclick="toggleDetail('detail-reference', this)">▼</button>
                    <div id="detail-reference" class="detail-panel">
                        <div id="res-reference" class="text-card-content"></div>
                    </div>
                </div>

                <div class="result-card" style="grid-column: span 2;">
                    <span class="label">🗣️ AI가 인식한 내 목소리</span>
                    <button class="toggle-btn" onclick="toggleDetail('detail-recognized', this)">▼</button>
                    <div id="detail-recognized" class="detail-panel">
                        <div id="res-recognized" class="text-card-content"></div>
                    </div>
                </div>
            </div>

            <button onclick="goHome()">🏠 처음으로 돌아가기</button>
        </div>

        <div id="screen-history" class="screen">
            <h1>나의 연습 기록 📜</h1>
            <div id="history-list" style="text-align: left; max-height: 400px; overflow-y: auto; margin-bottom: 20px;"></div>
            <button onclick="goHome()">🏠 홈으로 돌아가기</button>
        </div>

    </div>

    <script>
        const API_BASE_URL = "http://127.0.0.1:8080"; // 백엔드 주소로 명시적 수정 (Live Server 충돌 방지)
        const STATS_KEY = 'voice_stats_v1';

        let currentSentenceId = null;
        let mediaRecorder;
        let audioChunks = [];
        let timerInterval;
        let startTime;
        let progressInterval;

        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        function goHome() {
            if (timerInterval) clearInterval(timerInterval);
            if (mediaRecorder && mediaRecorder.state === "recording") {
                mediaRecorder.onstop = null;
                mediaRecorder.stop();
            }
            resetProgress();
            document.getElementById('btn-start-record').style.display = 'block';
            document.getElementById('btn-stop-record').style.display = 'none';
            document.getElementById('btn-analyze').style.display = 'none';
            document.getElementById('btn-retry').style.display = 'none';
            document.getElementById('loading').style.display = 'none';
            document.getElementById('timer').innerText = "00:00";
            
            // ⭐ 홈으로 갈 때 아나운서 플레이어 초기화
            document.getElementById('announcer-voice-container').style.display = 'none';
            document.getElementById('announcer-player').src = "";

            showScreen('screen-home');
        }

        async function startRandom() {
            try {
                const res = await fetch(`${API_BASE_URL}/api/sentence/random`);
                const data = await res.json();
                currentSentenceId = data.sentence_id;
                document.getElementById('script-display').innerText = data.text;
                showScreen('screen-record');
            } catch (error) {
                alert("서버 연결 실패! FastAPI가 실행 중인지 확인하세요.");
                console.error(error);
            }
        }

        async function startRecording() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];

                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                mediaRecorder.onstop = () => {
                    const blob = new Blob(audioChunks, { type: 'audio/webm' });
                    document.getElementById("result-audio").src = URL.createObjectURL(blob);
                    document.getElementById('btn-analyze').style.display = 'block';
                    document.getElementById('btn-retry').style.display = 'block';
                };

                mediaRecorder.start();
                document.getElementById('btn-start-record').style.display = 'none';
                document.getElementById('btn-stop-record').style.display = 'block';
                document.getElementById('btn-analyze').style.display = 'none';
                document.getElementById('btn-retry').style.display = 'none';

                startTime = Date.now();
                timerInterval = setInterval(() => {
                    const elapsed = Math.floor((Date.now() - startTime) / 1000);
                    const m = String(Math.floor(elapsed / 60)).padStart(2, '0');
                    const s = String(elapsed % 60).padStart(2, '0');
                    document.getElementById('timer').innerText = `${m}:${s}`;
                }, 1000);
            } catch (err) {
                alert("마이크 권한이 필요합니다.");
                console.error(err);
            }
        }

        function stopRecording() {
            if (mediaRecorder && mediaRecorder.state === "recording") {
                mediaRecorder.stop();
                clearInterval(timerInterval);
                document.getElementById('btn-stop-record').style.display = 'none';
            }
        }

        function startProgressSimulation(estimatedSec = 15) {
            document.getElementById('progress-wrap').style.display = 'block';
            const fill = document.getElementById('progress-fill');
            const txt = document.getElementById('progress-text');
            let pct = 0;
            fill.style.width = '0%';
            txt.innerText = '0%';
            const tickMs = 200;
            const step = 95 / ((estimatedSec * 1000) / tickMs);
            progressInterval = setInterval(() => {
                pct = Math.min(95, pct + step);
                fill.style.width = pct.toFixed(1) + '%';
                txt.innerText = Math.floor(pct) + '%';
            }, tickMs);
        }

        function finishProgress() {
            clearInterval(progressInterval);
            document.getElementById('progress-fill').style.width = '100%';
            document.getElementById('progress-text').innerText = '100%';
        }

        function resetProgress() {
            clearInterval(progressInterval);
            document.getElementById('progress-wrap').style.display = 'none';
            document.getElementById('progress-fill').style.width = '0%';
            document.getElementById('progress-text').innerText = '0%';
        }

        async function analyzeRecording() {
            document.getElementById('btn-analyze').style.display = 'none';
            document.getElementById('btn-retry').style.display = 'none';
            document.getElementById('loading').style.display = 'block';

            const recordedSec = Math.max(5, Math.floor((Date.now() - startTime) / 1000));
            startProgressSimulation(Math.round(recordedSec * 1.2));

            const blob = new Blob(audioChunks, { type: 'audio/webm' });
            const formData = new FormData();
            formData.append("file", blob, "record.webm");

            try {
                const res = await fetch(`${API_BASE_URL}/upload?sentence_id=${currentSentenceId}`, {
                    method: "POST", body: formData
                });
                const data = await res.json();
                finishProgress();
                setTimeout(() => {
                    resetProgress();
                    // ⭐ 수정: data(전체 응답)를 넘기도록 변경
                    displayResult(data); 
                }, 400);
            } catch (error) {
                alert("음성 분석 중 오류가 발생했습니다.");
                console.error(error);
                resetProgress();
                document.getElementById('btn-start-record').style.display = 'block';
                document.getElementById('loading').style.display = 'none';
            }
        }

        function retryRecording() {
            audioChunks = [];
            document.getElementById('btn-analyze').style.display = 'none';
            document.getElementById('btn-retry').style.display = 'none';
            document.getElementById('btn-start-record').style.display = 'block';
            document.getElementById('timer').innerText = "00:00";
        }

        async function showHistory() {
            try {
                const res = await fetch(`${API_BASE_URL}/api/history`);
                const data = await res.json();
                const list = document.getElementById('history-list');
                list.innerHTML = '';
                if (data.length === 0) {
                    list.innerHTML = '<p style="text-align:center;">아직 기록이 없습니다.</p>';
                } else {
                    data.forEach(item => {
                        const card = document.createElement('div');
                        card.className = 'result-card';
                        card.style.marginBottom = '10px';
                        card.innerHTML = `
                            <div style="font-size: 12px; color: #888;">${item.created_at}</div>
                            <div style="font-weight: bold; margin: 5px 0;">대본: ${item.original_text}</div>
                            <div style="color: var(--primary);">인식: ${item.recognized_text}</div>
                            <div style="font-weight: bold; color: #E24A4A;">점수: ${item.clarity_score * 100}점</div>
                        `;
                        list.appendChild(card);
                    });
                }
                showScreen('screen-history');
            } catch (error) {
                alert("기록을 불러오지 못했습니다.");
                console.error(error);
            }
        }

        function toggleDetail(panelId, btn) {
            const panel = document.getElementById(panelId);
            panel.classList.toggle('open');
            btn.classList.toggle('open');
        }

        function loadStats() {
            try { return JSON.parse(localStorage.getItem(STATS_KEY)) || {}; }
            catch (e) { return {}; }
        }
        function saveStats(stats) { localStorage.setItem(STATS_KEY, JSON.stringify(stats)); }
        function updateStats(metrics) {
            const stats = loadStats();
            ['clarity','accuracy','rate','silence','duration'].forEach(k => {
                if (!stats[k]) stats[k] = { sum: 0, count: 0 };
                stats[k].sum += metrics[k];
                stats[k].count += 1;
            });
            saveStats(stats);
            return stats;
        }
        function avg(stats, key) {
            if (!stats[key] || stats[key].count === 0) return null;
            return stats[key].sum / stats[key].count;
        }

        function fbClarity(s) {
            if (s >= 85) return "🌟 훌륭해요! 매우 또렷하고 정확한 발화입니다.";
            if (s >= 70) return "👍 좋아요. 조금만 더 다듬으면 완벽합니다.";
            if (s >= 50) return "🙂 괜찮은 수준이에요. 발음과 속도를 조금 더 신경 써보세요.";
            return "💪 연습이 더 필요해요. 천천히 또박또박 읽어보세요.";
        }
        function fbAccuracy(p) {
            if (p >= 90) return "발음이 매우 정확합니다.";
            if (p >= 75) return "대체로 정확하지만 일부 음절이 흐려졌어요.";
            if (p >= 50) return "발음이 흔들리는 구간이 있습니다. 입 모양을 크게 해보세요.";
            return "발음 정확도가 낮습니다. 단어를 끊어서 천천히 읽어보세요.";
        }
        function fbRate(r) {
            if (r >= 4 && r <= 7) return "이상적인 속도예요. 듣는 사람이 편안하게 느낍니다.";
            if (r < 4) return "조금 느린 편이에요. 자연스러운 리듬을 의식해보세요.";
            return "조금 빠른 편이에요. 호흡을 두면서 천천히 말해보세요.";
        }
        function fbSilence(p) {
            if (p <= 15) return "끊김이 거의 없는 자연스러운 발화입니다.";
            if (p <= 30) return "보통 수준의 침묵입니다.";
            return "침묵 비율이 높아요. 호흡 위치를 미리 정해두면 좋아요.";
        }
        function fbDuration(s) {
            if (s < 3) return "너무 짧아요. 문장을 끝까지 읽었는지 확인해보세요.";
            if (s > 30) return "긴 발화입니다. 호흡 분배에 신경 써보세요.";
            return "적절한 발화 길이입니다.";
        }

        function diffChars(ref, hyp) {
            const n = ref.length, m = hyp.length;
            const dp = Array.from({length: n + 1}, () => new Array(m + 1).fill(0));
            for (let i = 1; i <= n; i++) {
                for (let j = 1; j <= m; j++) {
                    dp[i][j] = ref[i-1] === hyp[j-1]
                        ? dp[i-1][j-1] + 1
                        : Math.max(dp[i-1][j], dp[i][j-1]);
                }
            }
            const marks = new Array(m).fill(false);
            let i = n, j = m;
            while (i > 0 && j > 0) {
                if (ref[i-1] === hyp[j-1]) { marks[j-1] = true; i--; j--; }
                else if (dp[i-1][j] >= dp[i][j-1]) i--;
                else j--;
            }
            return marks;
        }
        function escapeHtml(s) {
            return s.replace(/[&<>"']/g, c => ({
                '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
            }[c]));
        }
        function renderDiff(reference, hypothesis) {
            const refClean = (reference || '').replace(/\s+/g, '');
            const hypClean = (hypothesis || '').replace(/\s+/g, '');
            const marks = diffChars(refClean, hypClean);
            let html = '', buf = '', bufWrong = false;
            const flush = () => {
                if (!buf) return;
                html += bufWrong
                    ? `<span class="diff-wrong">${escapeHtml(buf)}</span>`
                    : escapeHtml(buf);
                buf = '';
            };
            for (let k = 0; k < hypClean.length; k++) {
                const wrong = !marks[k];
                if (wrong !== bufWrong) flush();
                bufWrong = wrong;
                buf += hypClean[k];
            }
            flush();
            return html;
        }

        // ⭐ 수정: data 전체를 인자로 받습니다.
        function displayResult(data) {
            const results = data.analysis_results;
            const m = results.metrics;

            document.getElementById('res-clarity').innerText = m.clarity_score;
            document.getElementById('res-accuracy').innerText = m.articulation_accuracy;
            document.getElementById('res-rate').innerText = m.speech_rate;
            document.getElementById('res-silence').innerText = m.silence_ratio;
            document.getElementById('res-duration').innerText = results.duration;

            document.getElementById('res-reference').innerText = results.reference_text;
            document.getElementById('res-recognized').innerHTML =
                renderDiff(results.reference_text, results.recognized_text);

            // --- 🎙️ 아나운서 오디오 연결 로직 시작 ---
            const announcerUrl = data.announcer_voice_url;
            const announcerContainer = document.getElementById('announcer-voice-container');
            const announcerPlayer = document.getElementById('announcer-player');

            if (announcerUrl) {
                if (announcerUrl.startsWith('http')) {
                    announcerPlayer.src = announcerUrl;
                } else {
                    announcerPlayer.src = `${API_BASE_URL}${announcerUrl}`;
                }
                announcerPlayer.load();
                announcerContainer.style.display = 'block';
            } else {
                announcerContainer.style.display = 'none';
            }
            // --- 아나운서 오디오 연결 로직 끝 ---

            const clarityNum  = parseFloat(String(m.clarity_score).replace(/[^0-9.]/g, '')) || 0;
            const accuracyNum = parseFloat(String(m.articulation_accuracy).replace(/[^0-9.]/g, '')) || 0;
            const rateNum     = parseFloat(String(m.speech_rate).replace(/[^0-9.]/g, '')) || 0;
            const silenceNum  = parseFloat(String(m.silence_ratio).replace(/[^0-9.]/g, '')) || 0;
            const durationNum = parseFloat(String(results.duration).replace(/[^0-9.]/g, '')) || 0;

            const stats = updateStats({
                clarity: clarityNum, accuracy: accuracyNum, rate: rateNum,
                silence: silenceNum, duration: durationNum
            });

            document.getElementById('fb-clarity').innerText  = fbClarity(clarityNum);
            document.getElementById('fb-accuracy').innerText = fbAccuracy(accuracyNum);
            document.getElementById('fb-rate').innerText     = fbRate(rateNum);
            document.getElementById('fb-silence').innerText  = fbSilence(silenceNum);
            document.getElementById('fb-duration').innerText = fbDuration(durationNum);

            const fmt = (v, suffix, digits = 1) => v === null ? '데이터 없음' : v.toFixed(digits) + suffix;
            document.getElementById('avg-clarity').innerText  = `평균 점수: ${fmt(avg(stats,'clarity'), '점')}`;
            document.getElementById('avg-accuracy').innerText = `평균 정확도: ${fmt(avg(stats,'accuracy'), '%')}`;
            document.getElementById('avg-rate').innerText     = `평균 속도: ${fmt(avg(stats,'rate'), ' 음절/초', 2)}`;
            document.getElementById('avg-silence').innerText  = `평균 침묵 비율: ${fmt(avg(stats,'silence'), '%')}`;
            document.getElementById('avg-duration').innerText = `평균 소요 시간: ${fmt(avg(stats,'duration'), '초')}`;

            // ⭐ 새로 추가한 detail-announcer도 패널 초기화 목록에 넣었습니다.
            ['detail-clarity','detail-accuracy','detail-rate','detail-silence','detail-duration',
             'detail-announcer', 'detail-audio','detail-reference','detail-recognized'].forEach(id => {
                const el = document.getElementById(id);
                if (el) el.classList.remove('open');
            });
            document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('open'));

            document.getElementById('loading').style.display = 'none';
            document.getElementById('btn-start-record').style.display = 'block';
            document.getElementById('timer').innerText = "00:00";

            showScreen('screen-result');
        }
    </script>
</body>
</html>
